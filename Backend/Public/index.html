<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="main-container">
       <div class="form">
        <h2>Library ManageMent</h2>
        <form action="" id="form">
            <input type="text" name="moviename" placeholder="Movie Name...">
            <select name="category" id="">
                <option value="action">Action</option>
                <option value="comedy">Comedy</option>
                <option value="drama">Drama</option>
                <option value="horror">Horror</option>
                <option value=" Sci-Fi"> Sci-Fi</option>
            </select>
            <input type="number" min="1" max="10" placeholder="Enter rating.." name="rating">
            <button class='submit-btn' type="submit" >Sumbit</button>
        </form>
       </div>
       <div class="searchDiv">
        <input type="text" placeholder="search Movie...." class="search">
       </div>
       <div class="grid-container">
        <div class="card">
            <h2>Empuran</h2>
            <h4>Category</h4>
            <p>9/10</p>
            <button class="edit">Edit</button>
            <button class="delete">Delete</button>
        </div>
       </div>
    </section>
    <script src="./script.js"></script>
</body>
</html>
